<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="apple-touch-icon" sizes="180x180" href="./assets/images/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="./assets/images/favicon/favicon-16x16.png">
    <link rel="manifest" href="./assets/images/favicon/site.webmanifest">
    <title>Settings | Cyphr</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.0/css/bulma.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css">
    <link rel="stylesheet" href="./assets/CSS/root.css">
    <link rel="stylesheet" href="./assets/CSS/settings.css">

</head>

<body>
    <header>
        <nav class="navbar">
            <div class="container is-max-desktop">

                <div class="navbar-brand">
                    <a id="brand-name" class="navbar-item has-text-weight-bold" href="/">CYPHR</a>
                </div>

                <div class="navbar-menu">
                    <div class="navbar-end">

                        <div class="navbar-item">
                            <a class="navbar-item" href="/dashboard.html">My Keys</a>
                        </div>

                        <div class="navbar-item">
                            <button class="button is-dark">Logout</button>
                        </div>

                    </div>
                </div>

            </div>
        </nav>
    </header>


    <main>

        <section class="section">
            <div class="container is-max-desktop">

                <h2 class="subtitle is-4 has-text-weight-semibold mb-6">Settings</h2>


                <!-- ACCOUNT -->

                <div class="settings-section">

                    <h3 class="settings-title">Account</h3>

                    <div class="settings-row">
                        <span>Email</span>
                        <span id="email-span" class="has-text-grey">email@example.xy</span>
                    </div>

                    <div class="settings-row">
                        <span>Name</span>
                        <span id="name-span" class="has-text-grey">John Doe</span>
                    </div>

                    <div class="settings-row">
                        <span>Account Created</span>
                        <span id="created-at-span" class="has-text-grey">March 2026</span>
                    </div>

                </div>


                <!-- SECURITY -->

                <div class="settings-section">

                    <h3 class="settings-title">Security</h3>

                    <div class="settings-row action-row">
                        <span>Logout</span>
                        <button id="settingsLogoutBtn" class="button is-dark is-small">Logout <i class="ri-logout-box-r-line r-icon"></i></button>
                    </div>

                </div>


                <!-- DANGER ZONE -->

                <div class="settings-section danger-zone">

                    <h3 class="settings-title danger-title">Danger Zone</h3>

                    <div class="settings-row action-row">
                        <span>Delete Account </span>

                        <button id="deleteAccountBtn" class="button danger-btn is-small">
                            Delete <i class="ri-delete-bin-6-line r-icon"></i>
                        </button>

                    </div>

                </div>


            </div>
        </section>

    </main>


    <footer class="footer">
        <div class="container is-max-desktop has-text-centered">
            <p class="has-text-weight-semibold">CYPHR</p>
            <p class="is-size-7">© 2026 CYPHR. All rights reserved.</p>
        </div>
    </footer>

    <script src="./assets/JS/script.js" type="module"></script>
    <script src="./assets/JS/navbar.js" type="module" defer></script>
    <script src="./assets/JS/alert_modal.js" type="module" defer></script>
    <script src="./assets/JS/settings.js" type="module" defer></script>

</body>

</html>
